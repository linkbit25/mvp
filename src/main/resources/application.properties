spring.application.name=LinkbitMVP

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:file:./data/linkbitdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Server
server.port=8080
server.error.include-message=never

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.url=/api-docs
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# H2 Console
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

linkbit.admin.emails=${LINKBIT_ADMIN_EMAILS:admin,admin@example.com,admin@linkbit.com}
linkbit.security.login-rate-limit.max-attempts=5
linkbit.security.login-rate-limit.window-minutes=15
linkbit.cors.allowed-origins=${LINKBIT_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}
